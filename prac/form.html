<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Login</h1>
    <form action="">
      <fieldset>
        <legend>Login</legend>
        <!--for랑 id 맞추면 라벨 눌러도 input 선택됨-->
        <label for="user-id">아이디</label>
        <input
          type="text"
          id="user-id"
          size="20"
          value="홍길동"
          maxlength="16"
        />
        <br />
        <label for="user-pw">패스워드</label>
        <input type="password" id="user-pw" size="20" />
        <br />
        <input type="submit" value="로그인" />

        <!--
        <br />
        <label>아이디(6자이상) <input type="text" /></label>
        -->
      </fieldset>
      <fieldset>
        <legend>배송 정보</legend>
        search: <input type="search" name="" id="" />
        <br />
        url: <input type="url" name="" id="" />
        <br />
        email: <input type="email" name="" id="" />
        <br />
        tel: <input type="tel" name="" id="" />
        <!--입력 검증 따로 없음-->
      </fieldset>
    </form>
    <form action="">
      <label for="fname">First name:</label><br />
      <input type="text" id="fname" name="fname" placeholder="John" /><br />
      <label for="lname">Last name:</label><br />
      <input type="text" id="lname" name="lname" value="Doe" /><br /><br />
      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>
    <h1>Radio</h1>
    <form>
      <input type="radio" id="html" name="fav_language" value="HTML" />
      <label for="html">HTML</label><br />
      <input type="radio" id="css" name="fav_language" value="CSS" />
      <label for="css">CSS</label><br />
      <input
        type="radio"
        id="javascript"
        name="fav_language"
        value="JavaScript"
      />
      <label for="javascript">JavaScript</label><br />
      <br />
      <input
        type="radio"
        name="fav_language2"
        id="python"
        value="Python"
        checked
      />
      <label for="python">Python</label><br />
      <input type="radio" name="fav_language2" id="c" value="C" />
      <label for="c">C</label>
    </form>
    <h1>Checkbox</h1>
    <form>
      <input
        type="checkbox"
        id="vehicle1"
        name="vehicle1"
        value="Bike"
        checked
      />
      <label for="vehicle1"> I have a bike</label><br />
      <input type="checkbox" id="vehicle2" name="vehicle2" value="Car" />
      <label for="vehicle2"> I have a car</label><br />
      <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat" />
      <label for="vehicle3"> I have a boat</label><br />
      부자네...
    </form>
    <h1>Input type</h1>
    <form action="">
      <input type="button" onclick="alert('Hello World!')" value="Click Me!" />
      <button onclick="alert('hi~')">click me~.~</button>

      <br />

      <label for="favcolor">Select your favorite color:</label>
      <input type="color" id="favcolor" name="favcolor" />

      <br />

      <label for="birthday">Birthday:</label>
      <input type="date" id="birthday" name="birthday" />

      <br />

      <label for="email">Enter your email:</label>
      <input type="email" id="email" name="email" />

      <br />

      <label for="myfile">Select a file:</label>
      <input type="file" id="myfile" name="myfile" />

      <br />

      <label for="fname">First name:</label>
      <input type="text" id="fname" name="fname" />

      <br />

      <input type="hidden" id="custId" name="custId" value="3487" />
      <input type="submit" value="Submit" />

      <br />

      <label for="bdaymonth">Birthday (month and year):</label>
      <input type="month" id="bdaymonth" name="bdaymonth" />

      <br />

      <label for="quantity">Quantity (between 5 and 55):</label>
      <input
        type="number"
        id="quantity"
        name="quantity"
        min="5"
        max="55"
        step="10"
        disabled
      />

      <br />

      <label for="vol">Volume (between 0 and 50):</label>
      <input type="range" id="vol" name="vol" min="0" max="50" />

      <br />

      <label for="appt">Select a time:</label>
      <input type="time" id="appt" name="appt" />

      <br />
      <label for="w3review">Review of W3Schools:</label>
      <textarea id="w3review" name="w3review" rows="4" cols="50">
At w3schools.com you will learn how to make a website. They offer free tutorials in all web development technologies.
</textarea
      >
    </form>

    <form action="">
      <h1>Select</h1>
      <label for="cars">Choose a car:</label>
      <select id="cars" name="cars">
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="fiat">Fiat</option>
        <option value="audi">Audi</option>
      </select>
      <input type="submit" />
    </form>
  </body>
</html>
