<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 여기는 메뉴입니다 -->
    <nav class="navbar">
      <div class="container">
        <div class="logo">Web Demo</div>
        <ul class="nav">
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="/about.html">About</a>
          </li>
          <li>
            <a href="/contact.html">Contact</a>
          </li>
          <li>
            <a href="/time.html">Time</a>
          </li>
          <li>
            <a href="/Sign_up.html">Sign up</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- 메인 세션 -->
    <section class="main">
      <div class="container">
        <h1>Sign up</h1>
        <p>회원가입 페이지입니다.</p>
        <p>아직 회원가입 기능은 구현되지 않았습니다.</p>
        <p>그치만 입력'은' 할 수 있답니다.</p>
        <form action="">
          <fieldset>
            <legend>Login</legend>
            <!--for랑 id 맞추면 라벨 눌러도 input 선택됨-->
            <label for="user-id">아이디</label>
            <input
              type="text"
              id="user-id"
              size="20"
              placeholder="수박 먹고 싶다"
              maxlength="16"
            />
            <br />
            <label for="user-pw">패스워드</label>
            <input
              type="password"
              id="user-pw"
              size="20"
              placeholder="딸기도 먹고 싶다"
            />
            <br />
            <input
              id="login"
              type="submit"
              onclick="alert('로그인은 안됐지만 버튼 누르기 성공~!')"
              value="로그인"
            />
          </fieldset>
        </form>
        <form action="">
          <fieldset>
            <legend for="write">쓰고 싶은 글이 있나요</legend>
            <textarea
              id="write"
              name="write"
              rows="5"
              cols="100"
              placeholder="수박은 맛있다. 딸기도 맛있다. 위에 로그인 버튼 누르면 쓴 글이 사라질 거예요."
            ></textarea>
          </fieldset>
        </form>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
